server:
  port: 8082

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:h2:mem:inventorydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring:
          json:
            add:
              type:
                headers: false
    consumer:
      group-id: inventory-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.pharmacy.inventory.messaging
        spring.json.value.default.type: com.pharmacy.inventory.messaging.SaleCreatedEvent
        spring.json.use.type.headers: false

app:
  kafka:
    topics:
      sale-created: sale-created
      product-created: product-created

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %clr(%-5level){green} %clr([${spring.application.name}]){cyan} %clr([%thread]){faint} %clr(%logger{36}){yellow} - %msg%n"
  level:
    com.pharmacy.inventory: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
