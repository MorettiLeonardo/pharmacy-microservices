server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: sales-service
          uri: ${SALES_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/sales/**
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/products/**
        - id: expiration-service
          uri: ${EXPIRATION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/expirations/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %clr(%-5level){green} %clr([${spring.application.name}]){cyan} %clr([%thread]){faint} %clr(%logger{36}){yellow} - %msg%n"
  level:
    com.pharmacy.gateway: INFO
    org.springframework.cloud.gateway: INFO
