server:
  port: 8083

spring:
  application:
    name: expiration-service
  datasource:
    url: jdbc:h2:mem:expirationdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: expiration-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.pharmacy.expiration.messaging
        spring.json.value.default.type: com.pharmacy.expiration.messaging.ProductCreatedEvent
        spring.json.use.type.headers: false

app:
  kafka:
    topics:
      product-created: product-created
  scheduler:
    expiration-check-rate: 20000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %clr(%-5level){green} %clr([${spring.application.name}]){cyan} %clr([%thread]){faint} %clr(%logger{36}){yellow} - %msg%n"
  level:
    com.pharmacy.expiration: INFO
